
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureBacktest | Terminal Authentication Gateway</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-pure: #020408;
            --bg-deep-gradient: radial-gradient(circle at 50% -20%, #0a1224 0%, #020408 70%);
            --glass-card: rgba(6, 11, 22, 0.45);
            --border-line: rgba(255, 255, 255, 0.05);
            --neon-cyan: #00F0FF;
            --neon-blue: #0072FF;
            --text-white: #FFFFFF;
            --text-slate: #64748B;
            --neon-red: #FF3366;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-pure); background-image: var(--bg-deep-gradient);
            color: #E2E8F0; font-family: 'Plus Jakarta Sans', sans-serif; display: flex;
            align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        /* Continuous Application Flashing Preloader Loading Loop Overlay */
        .app-preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #020408; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; transition: opacity 0.4s ease, visibility 0.4s ease; }
        .app-preloader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-logo-container { display: flex; flex-direction: column; align-items: center; gap: 20px; animation: brandPulse 1.2s ease-in-out infinite; }
        .logo-svg-wrapper { width: 100px; height: 100px; }
        .loader-text { color: #ffffff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .loader-text span { color: var(--neon-cyan); }
        .loader-subtext { color: var(--text-slate); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: -10px; }

        @keyframes brandPulse {
            0% { transform: scale(0.98); opacity: 0.4; filter: drop-shadow(0 0 0px rgba(0, 240, 255, 0)); }
            50% { transform: scale(1.02); opacity: 1.0; filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.3)); }
            100% { transform: scale(0.98); opacity: 0.4; filter: drop-shadow(0 0 0px rgba(0, 240, 255, 0)); }
        }

        .auth-card-wrapper {
            width: 420px; background: var(--glass-card); border: 1px solid var(--border-line);
            padding: 40px 35px; border-radius: 16px; box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px); position: relative; overflow: hidden;
        }

        .card-glow {
            position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,240,255,0.05) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; pointer-events: none;
        }

        .brand-logo-link { display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-bottom: 10px; }
        .brand-logo-svg { width: 36px; height: 36px; }
        .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-white); }
        .logo-text span { color: var(--neon-cyan); }

        .form-subtitle { text-align: center; font-size: 13px; color: var(--text-slate); margin: 0 0 25px 0; font-weight: 500; }

        /* Elite Psychology Quote Box Styling */
        .psychology-quote-box {
            background: rgba(0, 240, 255, 0.02);
            border: 1px dashed rgba(0, 240, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
        }
        .psychology-quote-text {
            font-size: 13px;
            line-height: 1.5;
            color: #94A3B8;
            font-weight: 500;
            margin: 0;
            font-style: italic;
        }
        .psychology-quote-text span {
            color: var(--neon-cyan);
            font-weight: 600;
            font-style: normal;
        }

        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-slate); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .input-group-field { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; background: rgba(3, 7, 18, 0.5); border: 1px solid var(--border-line);
            color: var(--text-white); padding: 12px 16px; border-radius: 8px; box-sizing: border-box;
            font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; outline: none;
        }
        input:focus { border-color: var(--neon-cyan); background: rgba(3, 7, 18, 0.8); box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); }
        
        .error-message-banner {
            background: rgba(255, 51, 102, 0.06); border: 1px solid rgba(255, 51, 102, 0.15);
            color: var(--neon-red); font-size: 12px; font-weight: 600; padding: 10px 14px;
            border-radius: 6px; margin-bottom: 20px; display: none; text-align: center;
        }

        .btn-submit-action {
            width: 100%; background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            color: #020408; padding: 14px; border: none; border-radius: 8px; font-weight: 800;
            font-size: 14px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.2); margin-top: 10px;
        }
        .btn-submit-action:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4); }

        .toggle-mode-panel { text-align: center; margin-top: 25px; font-size: 13px; color: var(--text-slate); }
        .toggle-mode-panel span { color: var(--neon-cyan); font-weight: 600; cursor: pointer; text-decoration: none; margin-left: 5px; }
        .toggle-mode-panel span:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="appPreloader" class="app-preloader">
    <div class="loader-logo-container">
        <svg class="logo-svg-wrapper" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M38 25H62M43 25V42L22 73C20 76 22 80 26 80H74C78 80 80 76 78 73L57 42V25" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="34" y="56" width="3" height="12" fill="#00b0ff"/>
            <path d="M35.5 52V72" stroke="#00b0ff" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="44" y="48" width="3" height="14" fill="#00b0ff"/>
            <path d="M45.5 42V66" stroke="#00b0ff" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="54" y="42" width="3" height="16" fill="#00FF94"/>
            <path d="M55.5 36V62" stroke="#00FF94" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="64" y="34" width="3" height="14" fill="#00FF94"/>
            <path d="M65.5 28V52" stroke="#00FF94" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="50" cy="72" r="10" fill="#020408" stroke="#00FF94" stroke-width="2.5"/>
            <polygon points="48,68 55,72 48,76" fill="#00FF94"/>
        </svg>
        <div class="loader-text">Pure<span>Backtest</span></div>
        <div class="loader-subtext">Quantifying Strategy Intelligence</div>
    </div>
</div>

<div class="auth-card-wrapper">
    <div class="card-glow"></div>

    <a href="index.html" class="brand-logo-link">
        <svg class="brand-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M38 25H62M43 25V42L22 73C20 76 22 80 26 80H74C78 80 80 76 78 73L57 42V25" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="34" y="56" width="3" height="12" fill="#00F0FF"/>
            <path d="M35.5 52V72" stroke="#00F0FF" stroke-width="2" stroke-linecap="round"/>
            <rect x="44" y="48" width="3" height="14" fill="#00F0FF"/>
            <path d="M45.5 42V66" stroke="#00F0FF" stroke-width="2" stroke-linecap="round"/>
            <rect x="54" y="42" width="3" height="16" fill="#00FF94"/>
            <path d="M55.5 36V62" stroke="#00FF94" stroke-width="2" stroke-linecap="round"/>
            <rect x="64" y="34" width="3" height="14" fill="#00FF94"/>
            <path d="M65.5 28V52" stroke="#00FF94" stroke-width="2" stroke-linecap="round"/>
            <circle cx="50" cy="72" r="9" fill="#020408" stroke="#00FF94" stroke-width="3"/>
            <polygon points="47,68 54,72 47,76" fill="#00FF94"/>
        </svg>
        <div class="logo-text">Pure<span>Backtest</span></div>
    </a>
    
    <div class="form-subtitle" id="authSubtitle">Access strategy replay control dashboard</div>

    <div class="psychology-quote-box">
        <p class="psychology-quote-text">
            "Trading is the hardest way to make easy money. To conquer the numbers, you must first <span>eliminate the human</span>."
        </p>
    </div>

    <div class="error-message-banner" id="errorBanner"></div>

    <form id="authForm" onsubmit="handleAuthSubmit(event)">
        <label for="email">Network Email Address</label>
        <div class="input-group-field">
            <input type="email" id="email" placeholder="name@domain.com" required>
        </div>

        <label for="password">Security Password</label>
        <div class="input-group-field">
            <input type="password" id="password" placeholder="••••••••••••" required>
        </div>

        <button type="submit" class="btn-submit-action" id="submitBtn">SIGN IN GATEWAY</button>
    </form>

    <div class="toggle-mode-panel">
        <span id="toggleTextLabel">Need a deployment key?</span>
        <span id="toggleLink" onclick="switchAuthMode()">Register Account</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAensfI53w49Fd4A7Lz5_K9N1JOxZsW7Kk",
        authDomain: "backtestlabpro.firebaseapp.com",
        projectId: "backtestlabpro",
        storageBucket: "backtestlabpro.firebasestorage.app",
        messagingSenderId: "560146824734",
        appId: "1:560146824734:web:5287d0ded3a1024e75780f",
        measurementId: "G-YY82TZ1ZG7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let currentMode = "login";

    onAuthStateChanged(auth, (user) => {
        const preloader = document.getElementById("appPreloader");
        if (preloader) preloader.classList.add("fade-out");

        if (user) {
            localStorage.setItem("user_uid", user.uid);
            localStorage.setItem("user_email", user.email);
            window.location.href = "index.html";
        }
    });

    window.switchAuthMode = function() {
        const subtitle = document.getElementById("authSubtitle");
        const submitBtn = document.getElementById("submitBtn");
        const toggleTextLabel = document.getElementById("toggleTextLabel");
        const toggleLink = document.getElementById("toggleLink");
        const errorBanner = document.getElementById("errorBanner");
        
        errorBanner.style.display = "none";
        
        if (currentMode === "login") {
            currentMode = "register";
            subtitle.innerText = "Provision clean cloud node metrics tracking";
            submitBtn.innerText = "CREATE ACCOUNT PORTAL";
            toggleTextLabel.innerText = "Already validated?";
            toggleLink.innerText = "Sign In instead";
        } else {
            currentMode = "login";
            subtitle.innerText = "Access strategy replay control dashboard";
            submitBtn.innerText = "SIGN IN GATEWAY";
            toggleTextLabel.innerText = "Need a deployment key?";
            toggleLink.innerText = "Register Account";
        }
    };

    window.handleAuthSubmit = async function(e) {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorBanner = document.getElementById("errorBanner");
        const preloader = document.getElementById("appPreloader");

        errorBanner.style.display = "none";
        if (preloader) preloader.classList.remove("fade-out");

        try {
            if (currentMode === "login") {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
            }
        } catch (error) {
            if (preloader) preloader.classList.add("fade-out");
            errorBanner.style.display = "block";
            
            switch (error.code) {
                case "auth/invalid-credential":
                    errorBanner.innerText = "Invalid authentication parameters provided. Check inputs.";
                    break;
                case "auth/email-already-in-use":
                    errorBanner.innerText = "The requested account coordinate mapping profile already exists.";
                    break;
                case "auth/weak-password":
                    errorBanner.innerText = "Security structural requirement unmet. Password must exceed 6 signs.";
                    break;
                case "auth/invalid-email":
                    errorBanner.innerText = "Malformed target network identification matrix layout.";
                    break;
                default:
                    errorBanner.innerText = error.message;
            }
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKTESTLABPRO Core Quantum Ledger Suite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg-pure: #030712;
            --bg-panel: rgba(11, 15, 25, 0.65);
            --bg-panel-solid: #0b0f19;
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-glow-cyan: rgba(6, 182, 212, 0.15);
            --glass-glow-purple: rgba(147, 51, 234, 0.12);
            
            /* Quant Strategy Palette */
            --neon-cyan: #06b6d4;
            --neon-emerald: #10b981;
            --neon-bear: #ef4444;
            --neon-warning: #f59e0b;
            --neon-purple: #a855f7;
            
            /* Text Tones */
            --text-pure: #ffffff;
            --text-silver: #f3f4f6;
            --text-slate: #9ca3af;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-pure);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 0% 0%, rgba(147, 51, 234, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
            color: var(--text-pure);
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        .font-mono {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        /* Institutional Fixed Navigation Bar */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 2000;
        }

        .brand-container {
            display: flex; align-items: center; gap: 12px;
        }
        .brand-logo {
            font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 16px; font-weight: 800; letter-spacing: 2px;
            text-decoration: none; color: var(--text-pure); display: flex; align-items: center; gap: 6px;
        }
        .brand-logo span { color: var(--neon-cyan); }
        .platform-badge {
            background: rgba(168,85,247,0.1);
            border: 1px solid rgba(168,85,247,0.2); border-radius: 4px;
            font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 9px; padding: 2px 6px; color: var(--neon-purple); font-weight: 700;
        }

        .action-control-group {
            display: flex; align-items: center; gap: 8px;
        }
        .nav-back-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            color: var(--text-silver); padding: 6px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s ease;
            display: flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .nav-back-btn:hover {
            border-color: var(--neon-cyan); background: rgba(6, 182, 212, 0.05); color: #fff;
        }

        .icon-svg {
            width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Workspace Framework */
        .workspace-container {
            width: 100%; max-width: 1600px; margin: 0 auto; padding: 104px 24px 40px 24px;
            display: flex; flex-direction: column; gap: 32px;
        }

        /* Hero Header Section */
        .page-heading-panel {
            background: var(--bg-panel); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 32px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            position: relative;
        }
        .page-heading-panel h1 {
            font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 60%, var(--text-slate));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-heading-panel p {
            color: var(--text-slate); font-size: 14px; max-width: 800px; line-height: 1.5;
        }

        /* Dynamic Engine Loading State */
        #loadingIndicator {
            font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; color: var(--neon-cyan);
            text-align: center; padding: 60px 0; background: var(--bg-panel); border: 1px solid var(--glass-border);
            border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Grid Pattern Housing Matrix Card Nodes */
        .sessions-matrix-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px;
        }

        .session-entry-card {
            background: var(--bg-panel); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 24px; backdrop-filter: blur(8px); cursor: pointer;
            display: flex; flex-direction: column; gap: 16px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .session-entry-card:hover {
            transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3);
            background: rgba(11, 15, 25, 0.8); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card-meta-header { display: flex; justify-content: space-between; align-items: center; }
        .asset-pill {
            background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--neon-cyan); font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
        }
        .timeframe-badge { 
            font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; 
            color: var(--text-slate); font-weight: 700; background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border); padding: 2px 6px; border-radius: 4px;
        }

        .session-display-title { font-size: 18px; font-weight: 700; color: var(--text-pure); letter-spacing: -0.01em; }

        .session-metrics-distribution {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border);
            padding: 16px 0;
        }
        .m-box { display: flex; flex-direction: column; gap: 4px; }
        .m-lbl { font-size: 9px; font-family: 'JetBrains Mono', ui-monospace, monospace; color: var(--text-slate); text-transform: uppercase; }
        .m-val { font-size: 13px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 700; color: var(--text-silver); }
        
        .metric-pos { color: var(--neon-emerald) !important; }
        .metric-neg { color: var(--neon-bear) !important; }

        .card-footer-anchor {
            font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; color: var(--text-slate);
            font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px;
            transition: color 0.15s ease; margin-top: auto;
        }
        .session-entry-card:hover .card-footer-anchor { color: var(--neon-cyan); }

        /* Empty State Layout Fallbacks */
        .empty-state-message {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--bg-panel);
            border: 1px dashed rgba(255,255,255,0.08); border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        }
        .empty-state-message h3 { font-size: 16px; font-weight: 700; text-transform: uppercase; color: var(--text-pure); letter-spacing: 0.5px;}
        .empty-state-message p { color: var(--text-slate); font-size: 13px; max-width: 420px; line-height: 1.4; margin-bottom: 8px;}
        
        .cta-btn-primary {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(6, 182, 212, 0.2));
            border: 1px solid rgba(147, 51, 234, 0.4); color: var(--text-pure);
            padding: 8px 20px; border-radius: 8px; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.15s ease; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .cta-btn-primary:hover { border-color: var(--neon-cyan); background: rgba(6, 182, 212, 0.1); transform: translateY(-1px); }

        @media (min-width: 1024px) {
            header { padding: 0 40px; }
            .workspace-container { padding: 104px 40px 40px 40px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAensfI53w49Fd4A7Lz5_K9N1JOxZsW7Kk",
            authDomain: "backtestlabpro.firebaseapp.com",
            projectId: "backtestlabpro",
            storageBucket: "backtestlabpro.firebasestorage.app",
            messagingSenderId: "560146824734",
            appId: "1:560146824734:web:5287d0ded3a1024e75780f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const gridContainer = document.getElementById("sessionsGrid");
        const loadingIndicator = document.getElementById("loadingIndicator");

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            try {
                const sessionsRef = collection(db, "users", user.uid, "sessions");
                const querySnapshot = await getDocs(sessionsRef);
                
                loadingIndicator.style.display = "none";
                
                if (querySnapshot.empty) {
                    gridContainer.innerHTML = `
                        <div class="empty-state-message">
                            <h3>No Backtest Run Logs Found</h3>
                            <p>You haven't preserved any trading sessions yet. Open the charting terminal to commit your data layers.</p>
                            <a href="chart.html" class="cta-btn-primary">
                                <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                                <span>LAUNCH TERMINAL</span>
                            </a>
                        </div>
                    `;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const session = doc.data();
                    const sessionId = doc.id;
                    
                    const name = session.session_name || "Unnamed Replay Run";
                    const symbol = session.symbol || "N/A";
                    const timeframe = session.timeframe || "N/A";
                    const winrate = session.winrate || "0%";
                    const profit = session.total_pl || "$0.00";
                    const balance = session.balance || "10000";

                    const isNegative = profit.includes("-");
                    const profitStyleClass = isNegative ? "metric-neg" : (profit !== "$0.00" ? "metric-pos" : "");

                    const card = document.createElement("div");
                    card.className = "session-entry-card";
                    card.onclick = () => {
                        window.location.href = `analytics.html?userId=${user.uid}&sessionId=${sessionId}`;
                    };

                    card.innerHTML = `
                        <div class="card-meta-header">
                            <span class="asset-pill">${symbol}</span>
                            <span class="timeframe-badge">${timeframe.toUpperCase()}</span>
                        </div>
                        <h3 class="session-display-title">${name}</h3>
                        
                        <div class="session-metrics-distribution">
                            <div class="m-box">
                                <span class="m-lbl">Win Rate</span>
                                <span class="m-val" style="color: var(--neon-emerald);">${winrate}</span>
                            </div>
                            <div class="m-box">
                                <span class="m-lbl">Net P&L</span>
                                <span class="m-val ${profitStyleClass}">${profit}</span>
                            </div>
                            <div class="m-box">
                                <span class="m-lbl">Balance</span>
                                <span class="m-val">$${Number(balance).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="card-footer-anchor">
                            <span>VIEW DEEP METRICS</span>
                            <svg class="icon-svg" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </div>
                    `;
                    
                    gridContainer.appendChild(card);
                });

            } catch (error) {
                console.error("Error reading session configuration matrices:", error);
                loadingIndicator.innerHTML = `<span style="color:var(--neon-bear)">[EXCEPTIONAL HALT]: Error pulling database layers. Verify connection variables.</span>`;
            }
        });
    </script>
</head>
<body>

    <header>
        <div class="brand-container">
            <a href="index.html" class="brand-logo">BACKTESTLABPRO<span></span></a>
            <div class="platform-badge font-mono">QUANT CORE v4.2</div>
        </div>
        <div class="action-control-group">
            <a href="index.html" class="nav-back-btn">
                <svg class="icon-svg" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span class="font-mono">RETURN HOME</span>
            </a>
        </div>
    </header>

    <main class="workspace-container">
        <div class="page-heading-panel">
            <h1>Your Backtesting Ledger</h1>
            <p>Select any historical replay run below to parse structural win metrics, track historical equity growth curves, or log systemic engine execution patterns.</p>
        </div>

        <div id="loadingIndicator">
            <svg class="icon-svg" style="animation: pulse-glow 1s infinite alternate;" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></svg>
            <span>QUERYING FIRESTORE SESSION STREAMS...</span>
        </div>

        <div id="sessionsGrid" class="sessions-matrix-grid"></div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    
    <!-- 1. LIVE PAYPAL SDK SCRIPT -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAEqqBng4jRkrWgNQ1maidDZcJ20ijG31YidgtYcbdBubwS1vGWHVr08Xa-4Ip9k6mV8YCw3Z7BTt0KAc&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #0b0e11; /* Premium Dark Background */
            color: #eaecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .checkout-card {
            background: #181a20; /* Dark Card Surface */
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            border: 1px solid #2b3139;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            padding: 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: #848e9c;
        }

        .product-info {
            background-color: #1e222a; /* Inner Container */
            border: 1px solid #2b3139;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .product-desc {
            font-size: 13px;
            color: #848e9c;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .price-divider {
            border-top: 1px dashed #474f59;
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 14px;
            color: #848e9c;
        }

        .price-value {
            font-size: 20px;
            font-weight: 700;
            color: #0ecb81; /* Premium Accent Green */
        }

        /* Container wrapper to maintain layout constraints during load */
        .payment-container-wrapper {
            min-height: 150px; 
        }

        /* FORCE HIDE AUTOMATIC REPEATED TEXT BLOCKS FROM PAYPAL INJECTION */
        .payment-container-wrapper [data-testid="hosted-button-title"],
        .payment-container-wrapper h2, 
        .payment-container-wrapper h3,
        .payment-container-wrapper p:not(.secure-badge p) {
            display: none !important;
        }

        .secure-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 12px;
            color: #474f59;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        
        <!-- Header -->
        <div class="header">
            <h1>Secure Payment</h1>
            <p>Review your order details below</p>
        </div>

        <!-- Product Details Box -->
        <div class="product-info">
            <div class="product-name">Simple Bot Development</div>
            <div class="product-desc">Access to your digital workspace parameters will be granted immediately after successful payment verification.</div>
            
            <div class="price-divider">
                <span class="price-label">Total to Pay</span>
                <span class="price-value">$399 USD</span>
            </div>
        </div>

        <!-- 2. LIVE PAYPAL CONTAINER TARGET -->
        <div class="payment-container-wrapper">
            <div id="paypal-container-LV4M4LE5TJWQ2"></div>
        </div>

        <!-- Security Badge footer -->
        <div class="secure-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Secured via PayPal Live Encryption
        </div>

    </div>

    <!-- 3. LIVE PAYPAL INITIALIZATION SCRIPT -->
    <script>  
        paypal.HostedButtons({    
            hostedButtonId: "LV4M4LE5TJWQ2",  
        }).render("#paypal-container-LV4M4LE5TJWQ2")
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Payment...</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0b0e11; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    
    <div style="text-align:center;">
        <h2 id="status">Verifying subscription...</h2>
        <p id="details" style="color:#848e9c; margin-bottom: 20px;"></p>
        <a id="homeBtn" href="https://backtestlabpro.com" style="display:none; background:#0ecb81; color:black; font-weight:bold; padding:12px 24px; border-radius:8px; text-decoration:none; font-size:16px; transition: background 0.2s;">
            Go to Home Page
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAensfI53w49Fd4A7Lz5_K9N1JOxZsW7Kk",
            authDomain: "backtestlabpro.firebaseapp.com",
            projectId: "backtestlabpro",
            storageBucket: "backtestlabpro.firebasestorage.app",
            messagingSenderId: "560146824734",
            appId: "1:560146824734:web:5287d0ded3a1024e75780f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const statusEl = document.getElementById('status');
        const detailsEl = document.getElementById('details');
        const homeBtn = document.getElementById('homeBtn');

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    // Update user document to set paid status
                    await db.collection("users").doc(user.uid).set({
                        isPaid: true,
                        planStatus: "paid",
                        paymentDate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    statusEl.innerText = "Access Unlocked!";
                    detailsEl.innerText = "Your subscription was activated successfully. Redirecting you home...";
                    
                    // Show manual backup button
                    homeBtn.style.display = "inline-block";

                    // Clean full-screen history replace to clear the payment screens from history stack
                    setTimeout(() => {
                        window.location.replace("https://backtestlabpro.com");
                    }, 2000);

                    homeBtn.onclick = function(e) {
                        window.location.href = "https://backtestlabpro.com";
                        return true;
                    };

                } catch (error) {
                    statusEl.innerText = "Database Error!";
                    detailsEl.innerText = "Code: " + error.code;
                    console.error("Firestore Error:", error);
                }
            } else {
                statusEl.innerText = "Authentication Error";
                detailsEl.innerHTML = "No user found. Please <a href='login.html' style='color:#3b82f6;'>log in</a> to verify your account.";
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Payment...</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0b0e11; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    
    <div style="text-align:center;">
        <h2 id="status">Verifying payment...</h2>
        <p id="details" style="color:#848e9c;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAensfI53w49Fd4A7Lz5_K9N1JOxZsW7Kk",
            authDomain: "backtestlabpro.firebaseapp.com",
            projectId: "backtestlabpro",
            storageBucket: "backtestlabpro.firebasestorage.app",
            messagingSenderId: "560146824734",
            appId: "1:560146824734:web:5287d0ded3a1024e75780f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const statusEl = document.getElementById('status');
        const detailsEl = document.getElementById('details');

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                statusEl.innerText = "Authentication Error";
                detailsEl.innerHTML = "No user found. Please <a href='login.html' style='color:#3b82f6;'>log in</a>.";
                return;
            }

            // Capture sessionId from the URL (e.g., success.html?sessionId=xyz123)
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');

            if (!sessionId) {
                statusEl.innerText = "Error: Invalid Request";
                detailsEl.innerText = "No session identifier provided.";
                return;
            }

            try {
                // Target the specific session sub-collection document
                await db.collection("users").doc(user.uid)
                        .collection("sessions").doc(sessionId).set({
                    isPaid: true,
                    planStatus: "paid",
                    paymentDate: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                statusEl.innerText = "Access Unlocked!";
                detailsEl.innerText = "Redirecting to home page...";
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            } catch (error) {
                statusEl.innerText = "Database Error!";
                detailsEl.innerText = "Code: " + error.code;
                console.error("Firestore Error:", error);
            }
        });
    </script>
</body>
</html>

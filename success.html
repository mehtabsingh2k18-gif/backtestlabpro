<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Payment...</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0b0e11; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    
    <div style="text-align:center;">
        <h2 id="status">Verifying payment...</h2>
        <p id="details" style="color:#848e9c;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAensfI53w49Fd4A7Lz5_K9N1JOxZsW7Kk",
            authDomain: "backtestlabpro.firebaseapp.com",
            projectId: "backtestlabpro",
            storageBucket: "backtestlabpro.firebasestorage.app",
            messagingSenderId: "560146824734",
            appId: "1:560146824734:web:5287d0ded3a1024e75780f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const statusEl = document.getElementById('status');
        const detailsEl = document.getElementById('details');

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    // Update user document to set paid status
                    await db.collection("users").doc(user.uid).set({
                        isPaid: true,
                        planStatus: "paid",
                        paymentDate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    statusEl.innerText = "Access Unlocked!";
                    detailsEl.innerText = "Redirecting main window...";
                    
                    setTimeout(() => {
                        // Check if the parent main window is still open
                        if (window.opener && !window.opener.closed) {
                            // Change the URL of your original full-sized browser tab
                            window.opener.location.href = "https://backtestlabpro.com";
                        } else {
                            // Fallback to opening a normal, fresh tab if the main window was lost
                            window.open("https://backtestlabpro.com", "_blank");
                        }
                        
                        // Instantly close the small validation window
                        window.close();
                    }, 1500);
                } catch (error) {
                    statusEl.innerText = "Database Error!";
                    detailsEl.innerText = "Code: " + error.code;
                    console.error("Firestore Error:", error);
                }
            } else {
                statusEl.innerText = "Authentication Error";
                detailsEl.innerHTML = "No user found. Please <a href='login.html' style='color:#3b82f6;'>log in</a> to verify payment.";
            }
        });
    </script>
</body>
</html>
